name: C++ CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Integration smoke test
        run: python3 scripts/run_integration_test.py --binary build/lhbd_cli --socket /tmp/lhbd_ci.sock
